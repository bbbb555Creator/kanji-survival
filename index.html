<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>漢字合体サバイバル</title>
<script src="https://cdn.tailwindcss.com"></script>;
<style>
@import url('https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@400;500;900&family=Noto+Serif+JP:wght@900&family=Sawarabi+Mincho&display=swap';);

:root {
--bg-dark: #0f172a;
--accent-emerald: #10b981;
--accent-blue: #3b82f6;
}

body { 
font-family: 'Kiwi Maru', serif; 
background-color: var(--bg-dark); 
color: #f8fafc; 
touch-action: manipulation; 
user-select: none;
overflow: hidden;
}

.kanji-font { font-family: 'Sawarabi Mincho', 'Noto Serif JP', serif; }

.fade-in { animation: fadeIn 0.4s ease-out forwards; }
@keyframes fadeIn { 
from { opacity: 0; transform: translateY(10px); } 
to { opacity: 1; transform: translateY(0); } 
}

.choice-btn {
transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}
.choice-btn:active { transform: scale(0.92); }

.progress-glow {
box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
}
</style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
<div id="game-container" class="w-full max-w-md bg-slate-900 rounded-[2.5rem] shadow-2xl p-6 border border-slate-700/50 relative min-h-[680px] flex flex-col overflow-hidden">

<!-- Mute Button -->
<div class="absolute top-6 right-6 z-10">
<button id="mute-btn" onclick="toggleMute()" class="p-3 bg-slate-800/80 rounded-full text-slate-400 hover:text-white transition-colors backdrop-blur-sm border border-slate-700">
<svg id="volume-on" xmlns="http://www.w3.org/2000/svg"; class="h-6 w-6" viewBox="0 0 20 20" fill="currentColor">
<path fill-rule="evenodd" d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.686-3.686a1 1 0 011.111-.238zm5.459 2.158a1 1 0 011.414 0 7.5 7.5 0 010 10.608 1 1 0 01-1.414-1.414 5.5 5.5 0 000-7.78 1 1 0 010-1.414zm-2.828 2.828a1 1 0 011.414 0 3.5 3.5 0 010 4.95 1 1 0 01-1.414-1.414 1.5 1.5 0 000-2.122 1 1 0 010-1.414z" clip-rule="evenodd" />
</svg>
<svg id="volume-off" xmlns="http://www.w3.org/2000/svg"; class="h-6 w-6 hidden" viewBox="0 0 20 20" fill="currentColor">
<path fill-rule="evenodd" d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.686-3.686a1 1 0 011.111-.238zm10.457 1.86a1 1 0 010 1.414l-4.242 4.243 4.242 4.242a1 1 0 11-1.414 1.414L14.182 12l-4.242 4.242a1 1 0 11-1.414-1.414l4.242-4.242-4.242-4.243a1 1 0 011.414-1.414l4.242 4.243 4.242-4.243a1 1 0 011.414 0z" clip-rule="evenodd" />
</svg>
</button>
</div>

<!-- Title Screen -->
<div id="title-screen" class="flex-grow flex flex-col items-center justify-center text-center fade-in py-6">
<h1 class="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-br from-emerald-400 to-blue-500 leading-tight mb-8">漢字合体<br>サバイバル</h1>

<!-- Instructions Section -->
<div class="bg-slate-800/40 rounded-3xl p-6 mb-10 w-full border border-slate-700/50 backdrop-blur-sm">
<h2 class="text-emerald-400 font-bold mb-4 flex items-center justify-center">
<span class="mr-2">💡</span> 遊び方
</h2>
<ul class="text-left text-sm space-y-4 text-slate-300">
<li class="flex items-start">
<span class="bg-emerald-500 text-slate-900 rounded-full w-5 h-5 flex items-center justify-center text-[10px] font-bold mr-3 mt-0.5 shrink-0">1</span>
画面中央の「つくり（右側）」を確認。
</li>
<li class="flex items-start">
<span class="bg-emerald-500 text-slate-900 rounded-full w-5 h-5 flex items-center justify-center text-[10px] font-bold mr-3 mt-0.5 shrink-0">2</span>
下の４択から、正しい「へん（左側）」を選択。
</li>
<li class="flex items-start">
<span class="bg-emerald-500 text-slate-900 rounded-full w-5 h-5 flex items-center justify-center text-[10px] font-bold mr-3 mt-0.5 shrink-0">3</span>
<span class="text-white font-bold">50問連続正解</span>でクリア。ミスは許されない。
</li>
</ul>
</div>

<button onclick="startGame()" class="w-full py-6 bg-gradient-to-r from-emerald-600 to-blue-600 rounded-2xl text-2xl font-black text-white shadow-xl active:scale-95 transition-transform hover:brightness-110">
挑戦を開始する
</button>
<p class="mt-4 text-slate-500 text-xs">※サウンド再生を推奨します</p>
</div>

<!-- Game Screen -->
<div id="game-screen" class="hidden flex-grow flex flex-col fade-in">
<div class="flex justify-between items-end mb-4">
<div>
<div id="stage-name-display" class="text-slate-500 text-[10px] font-bold tracking-widest uppercase mb-1"></div>
<div id="level-badge" class="px-3 py-1 text-white text-[10px] rounded-full font-bold inline-block"></div>
</div>
<div class="text-right">
<div class="text-[10px] text-slate-500 font-bold">STREAK</div>
<div id="streak-count" class="text-emerald-400 text-3xl font-black leading-none">0</div>
</div>
</div>

<div class="w-full bg-slate-800 h-2 rounded-full mb-10 overflow-hidden border border-slate-700">
<div id="progress-bar" class="bg-gradient-to-r from-blue-500 to-emerald-500 h-full transition-all duration-300 progress-glow" style="width: 0%"></div>
</div>

<div class="text-center mb-10">
<div class="text-slate-400 text-xs mb-4 font-bold tracking-widest">第 <span id="q-num" class="text-xl font-black text-white px-1">1</span> / 50 問</div>
<div id="tsukuri-box" class="w-48 h-48 mx-auto bg-slate-800 border-4 border-slate-700/50 rounded-[3rem] flex items-center justify-center shadow-2xl relative">
<span id="tsukuri-display" class="kanji-font text-[8rem] text-white leading-none"></span>
<div class="absolute -left-4 w-12 h-12 border-2 border-dashed border-slate-600 rounded-lg flex items-center justify-center opacity-30">
<span class="text-slate-600 text-2xl">？</span>
</div>
</div>
</div>

<div id="choices-grid" class="grid grid-cols-2 gap-4 mt-auto"></div>
</div>

<!-- Overlay (Results/Messages) -->
<div id="overlay" class="hidden absolute inset-0 z-50 flex items-center justify-center bg-slate-950/95 p-8 backdrop-blur-lg text-center">
<div class="w-full fade-in">
<div id="overlay-icon" class="text-8xl mb-6"></div>
<div id="overlay-message" class="text-2xl font-black mb-8 px-4"></div>
<div id="result-kanji-container" class="hidden mb-12">
<div class="text-slate-500 text-xs mb-4">正解の合体</div>
<div id="result-kanji" class="kanji-font text-[7rem] text-white bg-slate-900 w-36 h-36 mx-auto flex items-center justify-center rounded-[2.5rem] border-2 border-slate-700 shadow-inner"></div>
</div>
<button id="action-btn" class="w-full py-5 rounded-2xl font-black text-xl shadow-xl transition-transform active:scale-95"></button>
</div>
</div>
</div>

<!-- AUDIO -->
<audio id="bgm-title" loop preload="auto"><source src="https://assets.mixkit.co/music/preview/mixkit-deep-urban-623.mp3"; type="audio/mpeg"></audio>
<audio id="bgm-stage1" loop preload="auto"><source src="https://assets.mixkit.co/music/preview/mixkit-tech-house-vibes-130.mp3"; type="audio/mpeg"></audio>
<audio id="bgm-stage2" loop preload="auto"><source src="https://assets.mixkit.co/music/preview/mixkit-games-worldbeat-466.mp3"; type="audio/mpeg"></audio>
<audio id="bgm-stage3" loop preload="auto"><source src="https://assets.mixkit.co/music/preview/mixkit-hazy-after-hours-132.mp3"; type="audio/mpeg"></audio>
<audio id="bgm-stage4" loop preload="auto"><source src="https://assets.mixkit.co/music/preview/mixkit-driving-ambition-32.mp3"; type="audio/mpeg"></audio>
<audio id="bgm-stage5" loop preload="auto"><source src="https://assets.mixkit.co/music/preview/mixkit-complex-772.mp3"; type="audio/mpeg"></audio>
<audio id="bgm-ending" loop preload="auto"><source src="https://assets.mixkit.co/music/preview/mixkit-valley-sunset-127.mp3"; type="audio/mpeg"></audio>

<audio id="sfx-correct" preload="auto"><source src="https://assets.mixkit.co/sfx/preview/mixkit-arcade-retro-changing-tab-206.mp3"; type="audio/mpeg"></audio>
<audio id="sfx-wrong" preload="auto"><source src="https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-notification-946.mp3"; type="audio/mpeg"></audio>

<script>
const KANJI_DATA = [
{ hen: "イ", tsukuri: "也", full: "他" }, { hen: "イ", tsukuri: "呆", full: "保" }, { hen: "イ", tsukuri: "寸", full: "付" }, { hen: "イ", tsukuri: "更", full: "便" },
{ hen: "シ", tsukuri: "也", full: "池" }, { hen: "シ", tsukuri: "工", full: "江" }, { hen: "シ", tsukuri: "舌", full: "活" }, { hen: "シ", tsukuri: "可", full: "河" },
{ hen: "木", tsukuri: "反", full: "板" }, { hen: "木", tsukuri: "口", full: "杏" }, { hen: "木", tsukuri: "神", full: "榊" }, { hen: "木", tsukuri: "風", full: "楓" },
{ hen: "火", tsukuri: "丁", full: "灯" }, { hen: "火", tsukuri: "暴", full: "爆" }, { hen: "火", tsukuri: "欠", full: "炊" }, { hen: "火", tsukuri: "因", full: "煙" },
{ hen: "土", tsukuri: "成", full: "城" }, { hen: "土", tsukuri: "里", full: "埋" }, { hen: "土", tsukuri: "也", full: "地" }, { hen: "土", tsukuri: "曾", full: "増" },
{ hen: "言", tsukuri: "五", full: "語" }, { hen: "言", tsukuri: "十", full: "計" }, { hen: "言", tsukuri: "己", full: "記" }, { hen: "言", tsukuri: "川", full: "訓" },
{ hen: "金", tsukuri: "同", full: "銅" }, { hen: "金", tsukuri: "失", full: "鉄" }, { hen: "金", tsukuri: "艮", full: "銀" }, { hen: "金", tsukuri: "句", full: "鉤" },
{ hen: "糸", tsukuri: "氏", full: "紙" }, { hen: "糸", tsukuri: "冬", full: "終" }, { hen: "糸", tsukuri: "会", full: "絵" }, { hen: "糸", tsukuri: "色", full: "絶" },
{ hen: "女", tsukuri: "古", full: "姑" }, { hen: "女", tsukuri: "未", full: "妹" }, { hen: "女", tsukuri: "市", full: "姉" }, { hen: "女", tsukuri: "台", full: "始" },
{ hen: "手", tsukuri: "及", full: "扱" }, { hen: "手", tsukuri: "丁", full: "打" }, { hen: "手", tsukuri: "受", full: "授" }, { hen: "手", tsukuri: "非", full: "排" },
{ hen: "口", tsukuri: "未", full: "味" }, { hen: "口", tsukuri: "昌", full: "唱" }, { hen: "口", tsukuri: "口", full: "回" }, { hen: "口", tsukuri: "乞", full: "吃" },
{ hen: "日", tsukuri: "月", full: "明" }, { hen: "日", tsukuri: "青", full: "晴" }, { hen: "日", tsukuri: "免", full: "晩" }, { hen: "日", tsukuri: "寺", full: "時" },
{ hen: "心", tsukuri: "荒", full: "慌" }, { hen: "心", tsukuri: "生", full: "性" }, { hen: "心", tsukuri: "亡", full: "忙" }, { hen: "心", tsukuri: "白", full: "怕" }
];

const ALL_HENS = ["イ", "シ", "木", "火", "土", "言", "金", "糸", "女", "手", "口", "日", "心", "月", "犭", "衤", "礻", "𩵋"];

const STAGES = [
{ name: "序章：静寂の試練", limit: 10, bgm: "bgm-stage1", color: "bg-emerald-600", msg: "まだ準備運動だよね？" },
{ name: "第二章：迷宮の門", limit: 20, bgm: "bgm-stage2", color: "bg-blue-600", msg: "お、少しやるじゃない。" },
{ name: "第三章：紅蓮の道", limit: 30, bgm: "bgm-stage3", color: "bg-amber-600", msg: "ここからが本当の地獄だよ。" },
{ name: "第四章：深淵の瞳", limit: 40, bgm: "bgm-stage4", color: "bg-purple-600", msg: "脳が震えてるんじゃない？" },
{ name: "最終章：神の領域", limit: 50, bgm: "bgm-stage5", color: "bg-rose-600", msg: "君に辿り着けるかな、この先へ。" }
];

const INSULTS = [
"え、今の本気？", "指が滑ったのかな？", "漢字、習ったことある？", 
"次は小学生からやり直す？", "その集中力、1分も持たないの？",
"合体失敗。センスの欠片もないね。"
];

let currentStreak = 0;
let isMuted = false;
let currentBgm = null;
let currentQ = null;

window.onload = () => {
playBgm('bgm-title');
};

function toggleMute() {
isMuted = !isMuted;
document.getElementById('volume-on').classList.toggle('hidden', isMuted);
document.getElementById('volume-off').classList.toggle('hidden', !isMuted);
if (currentBgm) currentBgm.muted = isMuted;
document.getElementById('sfx-correct').muted = isMuted;
document.getElementById('sfx-wrong').muted = isMuted;
}

function playBgm(id) {
if (currentBgm) {
if (currentBgm.id === id) return;
currentBgm.pause();
currentBgm.currentTime = 0;
}
currentBgm = document.getElementById(id);
if (currentBgm) {
currentBgm.muted = isMuted;
currentBgm.play().catch(() => {});
}
}

function startGame() {
currentStreak = 0;
document.getElementById('title-screen').classList.add('hidden');
document.getElementById('game-screen').classList.remove('hidden');
document.getElementById('overlay').classList.add('hidden');
nextQuestion();
}

function nextQuestion() {
currentStreak++;
if (currentStreak > 50) {
winGame();
return;
}

const stage = STAGES.find(s => currentStreak <= s.limit);
playBgm(stage.bgm);

updateUI(stage);

// データの抽出
currentQ = KANJI_DATA[Math.floor(Math.random() * KANJI_DATA.length)];
document.getElementById('tsukuri-display').innerText = currentQ.tsukuri;
document.getElementById('q-num').innerText = currentStreak;

// 選択肢作成
const choices = [currentQ.hen];
while (choices.length < 4) {
const randomHen = ALL_HENS[Math.floor(Math.random() * ALL_HENS.length)];
if (!choices.includes(randomHen)) choices.push(randomHen);
}
choices.sort(() => Math.random() - 0.5);

const grid = document.getElementById('choices-grid');
grid.innerHTML = '';
choices.forEach(hen => {
const btn = document.createElement('button');
btn.className = "choice-btn h-24 bg-slate-800 border-2 border-slate-700 rounded-2xl text-4xl text-white font-bold hover:bg-slate-700 hover:border-emerald-500/50 flex items-center justify-center shadow-lg";
btn.innerText = hen;
btn.onclick = () => checkAnswer(hen);
grid.appendChild(btn);
});
}

function updateUI(stage) {
const progress = (currentStreak / 50) * 100;
document.getElementById('progress-bar').style.width = `${progress}%`;
document.getElementById('streak-count').innerText = currentStreak - 1;

const badge = document.getElementById('level-badge');
badge.innerText = stage.name.split('：')[0];
badge.className = `px-3 py-1 text-white text-[10px] rounded-full font-bold inline-block ${stage.color}`;
document.getElementById('stage-name-display').innerText = stage.name;
}

function checkAnswer(selected) {
if (selected === currentQ.hen) {
document.getElementById('sfx-correct').currentTime = 0;
document.getElementById('sfx-correct').play().catch(() => {});
nextQuestion();
} else {
gameOver();
}
}

function gameOver() {
document.getElementById('sfx-wrong').play().catch(() => {});
const insult = INSULTS[Math.floor(Math.random() * INSULTS.length)];

showOverlay(
"❌",
`終了。<br><span class="text-rose-500 text-lg mt-2 block">${insult}</span>`,
"もう一度挑む",
startGame,
true
);
}

function winGame() {
playBgm('bgm-ending');
showOverlay(
"👑",
"完全制覇！<br><span class=\"text-emerald-400\">君の漢字力は神の域に達した。</span>",
"タイトルへ戻る",
() => location.reload(),
false
);
}

function showOverlay(icon, msg, btnText, action, showKanji) {
document.getElementById('overlay-icon').innerHTML = icon;
document.getElementById('overlay-message').innerHTML = msg;

const kanjiContainer = document.getElementById('result-kanji-container');
if (showKanji && currentQ) {
kanjiContainer.classList.remove('hidden');
document.getElementById('result-kanji').innerText = currentQ.full;
} else {
kanjiContainer.classList.add('hidden');
}

const btn = document.getElementById('action-btn');
btn.innerText = btnText;
btn.className = `w-full py-5 rounded-2xl font-black text-xl shadow-xl transition-transform active:scale-95 ${showKanji ? 'bg-slate-700 text-white' : 'bg-emerald-600 text-white'}`;
btn.onclick = action;

document.getElementById('overlay').classList.remove('hidden');
}
</script>
</body>
</html>
