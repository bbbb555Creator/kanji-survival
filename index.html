<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>漢字合体</title>
    
    <!-- iPhone ホーム画面用アイコン -->
    <link rel="apple-touch-icon" href="apple-touch-icon.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@400;500;900&family=Noto+Serif+JP:wght@900&family=Sawarabi+Mincho&display=swap');
        body { 
            font-family: 'Kiwi Maru', serif; 
            background-color: #0f172a; 
            color: #f8fafc; 
            touch-action: manipulation; 
            user-select: none; 
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }
        .kanji-font { font-family: 'Sawarabi Mincho', 'Noto Serif JP', serif; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .radical-btn:active { transform: scale(0.92); background-color: #1e293b; }
        
        #game-container {
            min-height: 100vh;
            min-height: -webkit-fill-available;
            padding-top: env(safe-area-inset-top);
        }

        .progress-marker {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 2px;
            background-color: rgba(15, 23, 42, 0.5);
            z-index: 10;
        }
    </style>
</head>
<body class="bg-slate-900">
    <div id="game-container" class="w-full flex flex-col relative overflow-hidden">
        
        <!-- バージョン表記 (左上) -->
        <div class="absolute top-14 left-6 z-50 text-[10px] text-slate-500 font-mono">
            ver.1.5
        </div>

        <!-- Screens -->
        <div id="title-screen" class="flex-grow flex flex-col items-center justify-center text-center p-8 fade-in">
            <div class="absolute top-16 right-6">
                <button onclick="toggleMute()" class="p-3 bg-slate-800/90 rounded-full text-slate-400 border border-slate-700">
                    <svg id="title-volume-on" class="h-6 w-6" viewBox="0 0 20 20" fill="currentColor">
                        <path d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.686-3.686a1 1 0 011.111-.238zm5.459 2.158a1 1 0 011.414 0 7.5 7.5 0 010 10.608 1 1 0 01-1.414-1.414 5.5 5.5 0 000-7.78 1 1 0 010-1.414zm-2.828 2.828a1 1 0 011.414 0 3.5 3.5 0 010 4.95 1 1 0 01-1.414-1.414 1.5 1.5 0 000-2.122 1 1 0 010-1.414z" />
                    </svg>
                    <svg id="title-volume-off" class="h-6 w-6 hidden" viewBox="0 0 20 20" fill="currentColor">
                        <path d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.686-3.686a1 1 0 011.111-.238zm10.457 1.86a1 1 0 010 1.414l-4.242 4.243 4.242 4.242a1 1 0 11-1.414 1.414L14.182 12l-4.242 4.242a1 1 0 11-1.414-1.414l4.242-4.242-4.242-4.243a1 1 0 011.414-1.414l4.242 4.243 4.242-4.243a1 1 0 011.414 0z" />
                    </svg>
                </button>
            </div>
            <h1 class="text-6xl font-black text-transparent bg-clip-text bg-gradient-to-br from-emerald-400 to-blue-500 leading-tight mb-16">漢字合体<br>サバイバル</h1>
            <button onclick="showInstructions()" class="w-full py-6 bg-slate-800 border border-slate-600 rounded-3xl text-2xl font-bold text-white shadow-xl active:scale-95 transition-all">遊び方をみる</button>
        </div>

        <div id="instruction-screen" class="hidden flex-grow flex flex-col items-center justify-center p-8 fade-in text-center">
            <h2 class="text-3xl font-black text-emerald-400 mb-10">遊び方ガイド</h2>
            <div class="bg-slate-800/50 rounded-3xl p-8 mb-12 w-full border border-slate-700 space-y-6 text-left shadow-inner">
                <p class="text-xl text-slate-200">① 出題される「つくり」を見る</p>
                <p class="text-xl text-slate-200">② 正しい「へん」を4択から選ぶ</p>
                <p class="text-xl text-slate-200">③ 50問連続正解で完全クリア！</p>
                <p class="text-rose-400 font-bold mt-6 text-center text-lg">※ミスした瞬間にゲーム終了</p>
            </div>
            <button onclick="startGame()" class="w-full py-6 bg-gradient-to-r from-emerald-600 to-blue-600 rounded-3xl text-2xl font-black text-white shadow-2xl active:scale-95 transition-transform">挑戦を開始する</button>
        </div>

        <div id="game-screen" class="hidden flex-grow flex flex-col p-6 fade-in">
            <div class="flex justify-between items-end mb-4 pt-8">
                <div id="level-badge" class="px-4 py-1.5 text-white text-xs rounded-full font-bold shadow-lg"></div>
                <!-- STREAKをSTAGEに変更 -->
                <div class="text-xs text-slate-500 font-bold text-right uppercase tracking-wider">Stage<br><span id="stage-count" class="text-emerald-400 text-3xl font-black">1</span></div>
            </div>

            <!-- 目盛り付き進捗バー -->
            <div class="relative w-full bg-slate-800 h-3 rounded-full overflow-hidden shadow-inner border border-slate-700">
                <div id="progress-bar" class="bg-gradient-to-r from-blue-500 to-emerald-500 h-full transition-all duration-300" style="width: 0%"></div>
                <div class="progress-marker" style="left: 20%;"></div>
                <div class="progress-marker" style="left: 40%;"></div>
                <div class="progress-marker" style="left: 60%;"></div>
                <div class="progress-marker" style="left: 80%;"></div>
            </div>

            <div class="flex justify-end mt-2 mb-2">
                <button id="mute-btn-game" onclick="toggleMute()" class="p-2 text-slate-500 hover:text-white transition-colors">
                    <svg id="game-volume-on" class="h-6 w-6" viewBox="0 0 20 20" fill="currentColor">
                        <path d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.686-3.686a1 1 0 011.111-.238zm5.459 2.158a1 1 0 011.414 0 7.5 7.5 0 010 10.608 1 1 0 01-1.414-1.414 5.5 5.5 0 000-7.78 1 1 0 010-1.414zm-2.828 2.828a1 1 0 011.414 0 3.5 3.5 0 010 4.95 1 1 0 01-1.414-1.414 1.5 1.5 0 000-2.122 1 1 0 010-1.414z" />
                    </svg>
                    <svg id="game-volume-off" class="h-6 w-6 hidden" viewBox="0 0 20 20" fill="currentColor">
                        <path d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.686-3.686a1 1 0 011.111-.238zm10.457 1.86a1 1 0 010 1.414l-4.242 4.243 4.242 4.242a1 1 0 11-1.414 1.414L14.182 12l-4.242 4.242a1 1 0 11-1.414-1.414l4.242-4.242-4.242-4.243a1 1 0 011.414-1.414l4.242 4.243 4.242-4.243a1 1 0 011.414 0z" />
                    </svg>
                </button>
            </div>

            <div class="text-center mb-8">
                <!-- ステージ名表記を削除し、問題数表示を拡大 -->
                <div class="text-slate-400 text-lg font-bold">第 <span id="q-num" class="text-5xl font-black text-white px-2">1</span> / 50 問</div>
                
                <div id="tsukuri-box" class="w-48 h-48 mx-auto mt-8 bg-slate-800 border-4 border-slate-700 rounded-[3.5rem] flex items-center justify-center shadow-2xl relative">
                    <span id="tsukuri-display" class="kanji-font text-[8rem] text-white"></span>
                </div>
            </div>
            <div id="choices-grid" class="grid grid-cols-2 gap-4 mt-auto mb-8"></div>
        </div>

        <!-- Overlay -->
        <div id="overlay" class="hidden absolute inset-0 z-50 flex items-center justify-center bg-slate-950/98 p-8 backdrop-blur-md text-center">
            <div class="w-full fade-in">
                <div id="overlay-icon" class="text-8xl mb-8"></div>
                <div id="overlay-message" class="text-2xl font-bold mb-10 text-slate-200"></div>
                <div id="result-kanji-container" class="hidden mb-12">
                    <div id="result-kanji" class="kanji-font text-[7rem] text-white bg-slate-900 w-40 h-40 mx-auto flex items-center justify-center rounded-[2.5rem] border border-slate-700 shadow-inner"></div>
                </div>
                <button id="action-btn" class="w-full py-6 rounded-3xl font-black text-2xl shadow-xl active:scale-95 transition-transform"></button>
            </div>
        </div>
    </div>

    <!-- AUDIO -->
    <audio id="bgm-stage1" loop preload="auto"><source src="stage1.mp3" type="audio/mpeg"></audio>
    <audio id="bgm-stage2" loop preload="auto"><source src="stage2.mp3" type="audio/mpeg"></audio>
    <audio id="bgm-stage3" loop preload="auto"><source src="srage3.mp3" type="audio/mpeg"></audio>
    <audio id="bgm-stage4" loop preload="auto"><source src="stage4.mp3" type="audio/mpeg"></audio>
    <audio id="bgm-stage5" loop preload="auto"><source src="stage5.mp3" type="audio/mpeg"></audio>
    <audio id="bgm-ending" loop preload="auto"><source src="kuria.mp3" type="audio/mpeg"></audio>
    <audio id="sfx-correct" preload="auto"><source src="seikai.mp3" type="audio/mpeg"></audio>
    <audio id="sfx-wrong" preload="auto"><source src="zannen.mp3" type="audio/mpeg"></audio>

    <script>
        let currentBgm = null; let isMuted = false; let currentIndex = 0; let masterList = [];
        const STAGE_CONFIG = [
            { id: 1, threshold: 10, name: "小学校低学年", color: "bg-blue-600", bgm: "bgm-stage1", msg: "次は高学年レベルへ。" },
            { id: 2, threshold: 20, name: "小学校高学年", color: "bg-emerald-600", bgm: "bgm-stage2", msg: "中学生レベルに突入。" },
            { id: 3, threshold: 30, name: "中学生(標準)", color: "bg-amber-600", bgm: "bgm-stage3", msg: "次はもっと険しいぞ。" },
            { id: 4, threshold: 40, name: "中学生(上級)", color: "bg-orange-600", bgm: "bgm-stage4", msg: "いよいよ高校・一般レベル。" },
            { id: 5, threshold: 50, name: "高校・一般", color: "bg-rose-600", bgm: "bgm-stage5", msg: "" }
        ];
        const taunts = ["こんなのもわかんないの？w", "出直してこい！", "小学生からやり直せば？", "本気出してこれ？w", "脳みそ動いてる？", "次は頑張ろうね(棒)", "漢字、苦手なんだねw", "ププッw どんまいw", "それ、部首じゃないよ？w", "お疲れ様でした〜(笑)"];
        
        const gameData = {
            stage1: [{t:'也',r:'土',k:'地',d:['石','糸','車']},{t:'白',r:'氵',k:'泊',d:['土','石','目']},{t:'丁',r:'扌',k:'打',d:['心','女','耳']},{t:'月',r:'日',k:'明',d:['扌','木','金']},{t:'未',r:'口',k:'味',d:['金','火','土']},{t:'生',r:'女',k:'姓',d:['金','火','木']},{t:'立',r:'氵',k:'泣',d:['金','火','土']},{t:'主',r:'氵',k:'注',d:['口','女','日']},{t:'毎',r:'氵',k:'海',d:['金','火','土']},{t:'不',r:'木',k:'杯',d:['火','口','金']}],
            stage2: [{t:'寺',r:'彳',k:'待',d:['目','火','王']},{t:'可',r:'亻',k:'何',d:['目','土','金']},{t:'令',r:'冫',k:'冷',d:['氵','木','口']},{t:'平',r:'言',k:'評',d:['扌','木','金']},{t:'交',r:'木',k:'校',d:['金','土','火']},{t:'古',r:'木',k:'枯',d:['火','金','目']},{t:'朱',r:'木',k:'株',d:['金','火','土']},{t:'見',r:'王',k:'現',d:['扌','木','火']},{t:'各',r:'木',k:'格',d:['金','火','土']},{t:'少',r:'石',k:'砂',d:['火','目','口']}],
            stage3: [{t:'成',r:'言',k:'誠',d:['扌','木','金']},{t:'失',r:'金',k:'鉄',d:['火','氵','土']},{t:'隹',r:'扌',k:'推',d:['金','火','土']},{t:'台',r:'氵',k:'治',d:['王','彳','目']},{t:'同',r:'氵',k:'洞',d:['言','扌','彳']},{t:'式',r:'扌',k:'拭',d:['金','火','木']},{t:'京',r:'氵',k:'涼',d:['金','火','木']},{t:'及',r:'氵',k:'汲',d:['木','金','土']},{t:'半',r:'亻',k:'伴',d:['金','火','木']},{t:'西',r:'日',k:'晒',d:['金','火','土']}],
            stage4: [{t:'荒',r:'忄',k:'慌',d:['扌','木','金']},{t:'登',r:'氵',k:'澄',d:['金','火','土']},{t:'義',r:'亻',k:'儀',d:['金','火','木']},{t:'普',r:'言',k:'譜',d:['金','火','木']},{t:'票',r:'木',k:'標',d:['火','土','口']},{t:'票',r:'氵',k:'漂',d:['火','土','口']},{t:'皮',r:'氵',k:'波',d:['金','火','土']},{t:'余',r:'彳',k:'徐',d:['目','耳','口']},{t:'巨',r:'扌',k:'拒',d:['目','耳','鼻']},{t:'司',r:'亻',k:'伺',d:['金','火','木']}],
            stage5: [{t:'尞',r:'亻',k:'僚',d:['金','火','木']},{t:'解',r:'忄',k:'懈',d:['金','火','木']},{t:'昔',r:'扌',k:'措',d:['言','火','目']},{t:'疑',r:'扌',k:'擬',d:['木','金','土']},{t:'取',r:'走',k:'趣',d:['金','火','木']},{t:'曼',r:'忄',k:'曼',d:['扌','火','土']},{t:'曼',r:'氵',k:'漫',d:['扌','火','土']},{t:'反',r:'亻',k:'仮',d:['金','火','土']},{t:'宛',r:'月',k:'腕',d:['扌','目','火']},{t:'某',r:'女',k:'媒',d:['氵','木','土']}]
        };

        function shuffle(a) { for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
        function showInstructions() { document.getElementById('title-screen').classList.add('hidden'); document.getElementById('instruction-screen').classList.remove('hidden'); }
        function playBgm(id) { const n = document.getElementById(id); if (!n || currentBgm === n) return; if (currentBgm) { currentBgm.pause(); currentBgm.currentTime = 0; } currentBgm = n; currentBgm.volume = 0.3; if (!isMuted) currentBgm.play().catch(e=>{}); }
        function playSfx(id) { if (isMuted) return; const s = document.getElementById(id); if (s) { s.currentTime = 0; s.volume = 0.5; s.play().catch(e=>{}); } }
        
        function toggleMute() { 
            isMuted = !isMuted; 
            ['title-volume-on', 'game-volume-on'].forEach(id => document.getElementById(id).classList.toggle('hidden', isMuted));
            ['title-volume-off', 'game-volume-off'].forEach(id => document.getElementById(id).classList.toggle('hidden', !isMuted));
            if (currentBgm) isMuted ? currentBgm.pause() : currentBgm.play().catch(e=>{}); 
        }
        
        function startGame() { 
            document.getElementById('instruction-screen').classList.add('hidden'); 
            document.getElementById('game-screen').classList.remove('hidden'); 
            masterList = [...shuffle([...gameData.stage1]),...shuffle([...gameData.stage2]),...shuffle([...gameData.stage3]),...shuffle([...gameData.stage4]),...shuffle([...gameData.stage5])]; 
            currentIndex = 0; 
            playBgm('bgm-stage1'); 
            initQuiz(); 
        }

        function initQuiz() { 
            const q = masterList[currentIndex]; 
            const s = STAGE_CONFIG.find(c => currentIndex < c.threshold) || STAGE_CONFIG[4]; 
            playBgm(s.bgm); 
            document.getElementById('tsukuri-display').textContent = q.t; 
            document.getElementById('q-num').textContent = currentIndex+1; 
            // STAGEカウントを表示（1〜5）
            document.getElementById('stage-count').textContent = s.id; 
            document.getElementById('progress-bar').style.width = `${(currentIndex/50)*100}%`; 
            const b = document.getElementById('level-badge'); 
            b.textContent = s.name; 
            b.className = `px-4 py-1.5 ${s.color} text-white text-xs rounded-full font-bold shadow-lg`; 
            
            const cs = shuffle([q.r, ...q.d]); 
            const g = document.getElementById('choices-grid'); 
            g.innerHTML = ''; 
            cs.forEach(r => { 
                const btn = document.createElement('button'); 
                btn.className = "radical-btn kanji-font py-6 text-7xl bg-slate-800 border-2 border-slate-700 rounded-3xl text-white shadow-xl"; 
                btn.textContent = r; 
                btn.onclick = () => check(r); 
                g.appendChild(btn); 
            }); 
        }

        function check(r) { 
            const q = masterList[currentIndex]; 
            const isC = (r === q.r); 
            const ov = document.getElementById('overlay'); 
            const m = document.getElementById('overlay-message'); 
            const ic = document.getElementById('overlay-icon'); 
            const bt = document.getElementById('action-btn'); 
            const kb = document.getElementById('result-kanji-container'); 
            ov.classList.remove('hidden'); 
            
            if (isC) { 
                playSfx('sfx-correct'); 
                currentIndex++; 
                const se = STAGE_CONFIG.findIndex(s => currentIndex === s.threshold); 
                if (se !== -1 && currentIndex < 50) { 
                    ic.textContent = "🏆"; 
                    m.innerHTML = "STAGE CLEAR!<br>" + STAGE_CONFIG[se].msg; 
                    kb.classList.add('hidden'); 
                    bt.textContent = "次のステージへ"; 
                    bt.className = "w-full py-6 bg-blue-600 text-white rounded-3xl font-black text-2xl shadow-lg"; 
                    bt.onclick = () => { ov.classList.add('hidden'); initQuiz(); }; 
                } else if (currentIndex >= 50) { 
                    playBgm('bgm-ending'); 
                    ic.textContent = "👑"; 
                    m.innerHTML = "全問制覇！おめでとう！"; 
                    kb.classList.remove('hidden'); 
                    document.getElementById('result-kanji').textContent = q.k; 
                    bt.textContent = "タイトルへ"; 
                    bt.className = "w-full py-6 bg-emerald-600 text-white rounded-3xl font-black text-2xl shadow-lg"; 
                    bt.onclick = () => location.reload(); 
                } else { 
                    ic.textContent = "🌸"; 
                    m.innerHTML = "正解！"; 
                    kb.classList.remove('hidden'); 
                    document.getElementById('result-kanji').textContent = q.k; 
                    bt.textContent = "次へ"; 
                    bt.className = "w-full py-6 bg-emerald-600 text-white rounded-3xl font-black text-2xl shadow-lg"; 
                    bt.onclick = () => { ov.classList.add('hidden'); initQuiz(); }; 
                } 
            } else { 
                if (currentBgm) currentBgm.pause(); 
                playSfx('sfx-wrong'); 
                ic.textContent = "💩"; 
                m.innerHTML = `<span class="text-rose-500 font-black">${taunts[Math.floor(Math.random()*taunts.length)]}</span><br><br>記録: ${currentIndex} 問`; 
                kb.classList.add('hidden'); 
                bt.textContent = "再挑戦する"; 
                bt.className = "w-full py-6 bg-slate-700 text-white rounded-3xl font-black text-2xl shadow-lg"; 
                bt.onclick = () => location.reload(); 
            } 
        }
    </script>
</body>
</html>
